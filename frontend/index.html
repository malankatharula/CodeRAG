<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeRAG — Codebase Q&A</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 32px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2f81f7;
    }

    header .tag {
      font-size: 0.75rem;
      background: #1f2937;
      color: #7d8590;
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid #30363d;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .sidebar {
      width: 320px;
      border-right: 1px solid #21262d;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 0.78rem;
      color: #7d8590;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .sidebar input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      transition: border 0.2s;
    }

    .sidebar input:focus { border-color: #2f81f7; }

    .sidebar input::placeholder { color: #484f58; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #2f81f7; color: #fff; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }

    .status-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.78rem;
      color: #7d8590;
      min-height: 60px;
    }

    .status-box.success { border-color: #238636; color: #3fb950; }
    .status-box.error   { border-color: #da3633; color: #f85149; }
    .status-box.loading { border-color: #2f81f7; color: #58a6ff; }

    .collections-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .collection-item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #7d8590;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      word-break: break-all;
    }

    .collection-item:hover,
    .collection-item.active {
      border-color: #2f81f7;
      color: #58a6ff;
    }

    /* ── RIGHT PANEL ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #484f58;
      gap: 12px;
      text-align: center;
    }

    .empty-state .icon { font-size: 3rem; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 820px;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .message .label {
      font-size: 0.72rem;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .message .bubble {
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.87rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1f3a5f;
      border: 1px solid #2f81f7;
      color: #cdd9e5;
    }

    .message.assistant .bubble {
      background: #161b22;
      border: 1px solid #21262d;
      color: #e6edf3;
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .source-tag {
      background: #1f2937;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.72rem;
      color: #7d8590;
    }

    .thinking {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
    }

    .thinking span {
      width: 7px; height: 7px;
      background: #2f81f7;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    .chat-input-area {
      padding: 16px 32px 24px;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border 0.2s;
    }

    .chat-input-area input:focus { border-color: #2f81f7; }
    .chat-input-area input::placeholder { color: #484f58; }

    .chat-input-area button {
      background: #2f81f7;
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .chat-input-area button:hover { opacity: 0.85; }
    .chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡ CodeRAG</div>
  <div class="tag">Local LLM · Ollama · ChromaDB</div>
</header>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <h3>Ingest Repository</h3>
      <input type="text" id="repoUrl" placeholder="https://github.com/user/repo" />
    </div>
    <button class="btn btn-primary" id="ingestBtn" onclick="ingestRepo()">Index Repository</button>
    <div class="status-box" id="ingestStatus">Paste a GitHub URL and click Index.</div>

    <div>
      <h3>Indexed Repos</h3>
      <div class="collections-list" id="collectionsList">
        <div style="font-size:0.78rem; color:#484f58;">None yet.</div>
      </div>
    </div>

    <button class="btn btn-secondary" onclick="loadCollections()">↻ Refresh</button>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>Index a GitHub repo on the left,<br/>then ask anything about its codebase.</p>
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="questionInput"
        placeholder="Ask about the codebase... (Enter to send)"
        onkeydown="if(event.key==='Enter') askQuestion()" />
      <button id="askBtn" onclick="askQuestion()">Ask</button>
    </div>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8000/api";
  let activeRepo = null;

  async function ingestRepo() {
    const url = document.getElementById("repoUrl").value.trim();
    if (!url) return;

    const btn = document.getElementById("ingestBtn");
    const status = document.getElementById("ingestStatus");

    btn.disabled = true;
    status.className = "status-box loading";
    status.textContent = "Cloning and indexing repo... this may take a minute.";

    try {
      const res = await fetch(`${API}/ingest`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ repo_url: url })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);

      status.className = "status-box success";
      status.textContent = `✓ Indexed ${data.files_indexed} files.`;
      activeRepo = url;
      loadCollections();
    } catch (err) {
      status.className = "status-box error";
      status.textContent = `✗ ${err.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  async function loadCollections() {
    try {
      const res = await fetch(`${API}/collections`);
      const data = await res.json();
      const list = document.getElementById("collectionsList");

      if (!data.collections.length) {
        list.innerHTML = `<div style="font-size:0.78rem;color:#484f58;">None yet.</div>`;
        return;
      }

      list.innerHTML = data.collections.map(c => `
        <div class="collection-item ${activeRepo && c === repoToCollection(activeRepo) ? 'active' : ''}"
             onclick="selectCollection('${c}')">
          ${c}
        </div>
      `).join("");
    } catch {}
  }

  function repoToCollection(url) {
    return url.replace(/https?:\/\/github\.com\//, "").replace(/[^a-zA-Z0-9_-]/g, "_").slice(0, 60);
  }

  function selectCollection(name) {
    document.querySelectorAll(".collection-item").forEach(el => el.classList.remove("active"));
    event.target.classList.add("active");
  }

  async function askQuestion() {
    const input = document.getElementById("questionInput");
    const question = input.value.trim();
    const repoUrl = document.getElementById("repoUrl").value.trim();

    if (!question || !repoUrl) {
      alert("Enter both a repo URL and a question.");
      return;
    }

    input.value = "";
    const btn = document.getElementById("askBtn");
    btn.disabled = true;

    const container = document.getElementById("chatMessages");

    // clear empty state
    const empty = container.querySelector(".empty-state");
    if (empty) empty.remove();

    // user message
    container.innerHTML += `
      <div class="message user">
        <div class="label">You</div>
        <div class="bubble">${escHtml(question)}</div>
      </div>`;

    // thinking indicator
    const thinkId = "think_" + Date.now();
    container.innerHTML += `
      <div class="message assistant" id="${thinkId}">
        <div class="label">CodeRAG</div>
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>`;
    container.scrollTop = container.scrollHeight;

    try {
      const res = await fetch(`${API}/ask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ repo_url: repoUrl, question })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);

      const sourceTags = data.sources.map(s =>
        `<span class="source-tag">${escHtml(s)}</span>`
      ).join("");

      document.getElementById(thinkId).outerHTML = `
        <div class="message assistant">
          <div class="label">CodeRAG</div>
          <div class="bubble">${escHtml(data.answer)}</div>
          ${data.sources.length ? `<div class="sources">${sourceTags}</div>` : ""}
        </div>`;
    } catch (err) {
      document.getElementById(thinkId).outerHTML = `
        <div class="message assistant">
          <div class="label">CodeRAG</div>
          <div class="bubble" style="color:#f85149;">✗ ${escHtml(err.message)}</div>
        </div>`;
    } finally {
      btn.disabled = false;
      container.scrollTop = container.scrollHeight;
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // load collections on startup
  loadCollections();
</script>
</body>
</html>
